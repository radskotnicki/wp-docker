; Xdebug is only active when XDEBUG_ENABLE=true in .env (rebuilt via: make build)
; This file is always copied but settings have no effect if xdebug is not installed.
[xdebug]
xdebug.mode=debug
xdebug.start_with_request=yes
xdebug.client_host=host.docker.internal
xdebug.client_port=9003
xdebug.log_level=0
